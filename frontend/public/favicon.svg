<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0f172a"/>

  <!-- Letter B -->
  <text x="50%" y="60%" text-anchor="middle" font-size="55" font-family="Poppins, Arial" fill="url(#g)">
    B
  </text>

  <!-- Animated glow circle -->
  <circle cx="50" cy="50" r="30" stroke="url(#g)" stroke-width="2" fill="none">
    <animate attributeName="r" values="25;35;25" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>